<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Brava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background-color: #6A3B2A;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.25rem;
  }
  .wrap {
    width: 100%;
    max-width: 420px;
  }
  .logo-area {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo-area img {
    width: 180px;
    max-width: 80%;
    height: auto;
    display: block;
    margin: 0 auto 12px;
  }
  .logo-sub {
    font-family: 'Roboto', sans-serif;
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .divider {
    width: 32px;
    height: 2px;
    background: rgba(255,255,255,0.4);
    margin: 12px auto 0;
    border-radius: 2px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    text-align: center;
    margin: 8px 0 2px;
  }
  a.link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: #FFFFFF;
    border: 1px solid #D8D0C4;
    border-radius: 10px;
    text-decoration: none;
    transition: border-color 0.18s, background 0.18s;
  }
  a.link-card:hover {
    border-color: #6A3B2A;
    background: #FAF8F6;
  }
  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-web  { background: #E6DFD5; color: #6A3B2A; }
  .icon-wa   { background: #DCF0E4; color: #1A7A3F; }
  .icon-wa-r { background: #F5E8E4; color: #6A3B2A; }
  .icon-map  { background: #E6DFD5; color: #6A3B2A; }
  .link-icon svg { width: 20px; height: 20px; }
  .link-text { flex: 1; min-width: 0; }
  .link-label {
    font-family: 'Roboto', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1;
  }
  .link-title {
    font-size: 14px;
    color: #6A3B2A;
    font-weight: 600;
    margin-top: 3px;
    line-height: 1.3;
  }
  .arrow {
    color: #B8AD9E;
    flex-shrink: 0;
  }
  a.link-card:hover .arrow { color: #6A3B2A; }
</style>
</head>
